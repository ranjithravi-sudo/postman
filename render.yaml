# Render.com blueprint — deploy from GitHub to get a public URL
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: holiday-verification
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BEARER_TOKEN
        sync: false
        # Set in Render Dashboard: Environment → BEARER_TOKEN (your API token)
